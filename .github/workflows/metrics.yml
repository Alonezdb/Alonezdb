name: Update Profile Metrics

on:
  schedule:
    # Run every 24 hours at 00:30 UTC
    - cron: "30 0 * * *"
  workflow_dispatch:
  push:
    paths:
      - 'scripts/metrics.js'

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Metrics Update Script
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_GITHUB_TOKEN }}
        run: node scripts/metrics.js

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/metrics.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: Update GitHub metrics [skip ci]"
          git push
