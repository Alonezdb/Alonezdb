name: Rebuild README Assets

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'assets/**'
      - 'README.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Master Build Script
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.METRICS_GITHUB_TOKEN }}
        run: node scripts/generate-svg.js

      - name: Commit all rebuilt assets
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/spotify.svg assets/metrics.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: Rebuild all SVG assets"
          git push
