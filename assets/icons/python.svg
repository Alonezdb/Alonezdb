<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60" fill="none">
  <defs>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-3px) rotate(-1deg); }
      }
      .icon-group {
        animation: float 4.8s ease-in-out infinite;
        animation-delay: -0.8s;
        transform-origin: center;
      }
      .border-glow {
        stroke: url(#borderGrad);
        stroke-width: 1.2;
      }
    </style>
    
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <g class="icon-group" filter="url(#shadow)">
    <!-- Glass Background -->
    <rect x="2" y="2" width="56" height="56" rx="14" fill="#09090b" fill-opacity="0.8" class="border-glow" />
    
    <!-- Python Path -->
    <g transform="translate(15, 15)" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <!-- Upper Snake -->
      <path d="M14.5,0 C21.5,0 23,1.5 23,6.5 L23,10 L14.5,10 C9.5,10 9,11.5 9,16.5 L9,22.5 L5,22.5 C1.5,22.5 0,21 0,16 L0,6.5 C0,1.5 1.5,0 6.5,0 Z" fill="#ffffff" fill-opacity="0.1" />
      <circle cx="6" cy="3.5" r="1" fill="#ffffff" stroke="none" />
      
      <!-- Lower Snake -->
      <path d="M15.5,30 C8.5,30 7,28.5 7,23.5 L7,20 L15.5,20 C20.5,20 21,18.5 21,13.5 L21,7.5 L25,7.5 C28.5,7.5 30,9 30,14 L30,23.5 C30,28.5 28.5,30 23.5,30 Z" fill="#ffffff" fill-opacity="0.15" />
      <circle cx="24" cy="26.5" r="1" fill="#ffffff" stroke="none" />
    </g>
    
    <!-- Mini indicator glow -->
    <circle cx="48" cy="48" r="2.5" fill="#457b9d" opacity="0.6" />
  </g>
</svg>
