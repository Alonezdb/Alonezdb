<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60" fill="none">
  <defs>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-3px) rotate(1deg); }
      }
      .icon-group {
        animation: float 5s ease-in-out infinite;
        animation-delay: -2.8s;
        transform-origin: center;
      }
      .border-glow {
        stroke: url(#borderGrad);
        stroke-width: 1.2;
      }
    </style>
    
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <g class="icon-group" filter="url(#shadow)">
    <!-- Glass Background -->
    <rect x="2" y="2" width="56" height="56" rx="14" fill="#09090b" fill-opacity="0.8" class="border-glow" />
    
    <!-- Linux Penguin Minimal Path -->
    <g transform="translate(17, 13)" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Body outline -->
      <path d="M13,2 C19,2 21,7 21,11 C21,12 20,15 22,17 C24,19 25,24 23,28 C21,32 17,33 13,33 C9,33 5,32 3,28 C1,24 2,19 4,17 C6,15 5,12 5,11 C5,7 7,2 13,2 Z" fill="#ffffff" fill-opacity="0.1" />
      <!-- Wings -->
      <path d="M4,17 C1,19 1,22 3,25" />
      <path d="M22,17 C25,19 25,22 23,25" />
      <!-- Feet -->
      <path d="M7,33 C5,34 5,36 8,36" />
      <path d="M19,33 C21,34 21,36 18,36" />
      <!-- Eyes -->
      <circle cx="10" cy="10" r="1" fill="#ffffff" stroke="none" />
      <circle cx="16" cy="10" r="1" fill="#ffffff" stroke="none" />
      <!-- Beak -->
      <path d="M11,13 L15,13 L13,15 Z" fill="#ffffff" />
    </g>
    
    <!-- Mini indicator glow -->
    <circle cx="48" cy="48" r="2.5" fill="#fca311" opacity="0.6" />
  </g>
</svg>
