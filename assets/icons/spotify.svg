<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60" fill="none">
  <defs>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-3px) rotate(-1deg); }
      }
      .icon-group {
        animation: float 4.7s ease-in-out infinite;
        animation-delay: -1.8s;
        transform-origin: center;
      }
      .border-glow {
        stroke: url(#borderGrad);
        stroke-width: 1.2;
      }
    </style>
    
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <g class="icon-group" filter="url(#shadow)">
    <!-- Glass Background -->
    <rect x="2" y="2" width="56" height="56" rx="14" fill="#09090b" fill-opacity="0.8" class="border-glow" />
    
    <!-- Spotify Soundwaves -->
    <g transform="translate(16, 16)" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" fill="none">
      <circle cx="14" cy="14" r="13" stroke-width="1.8" />
      <path d="M7,10 C11,8 17,8 21,10" />
      <path d="M8.5,14 C12,12.5 16,12.5 19.5,14" />
      <path d="M10,18 C12.5,17 15.5,17 18,18" />
    </g>
    
    <!-- Mini indicator glow -->
    <circle cx="48" cy="48" r="2.5" fill="#1db954" opacity="0.6" />
  </g>
</svg>
