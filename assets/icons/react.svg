<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60" fill="none">
  <defs>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-3.2px); }
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .icon-group {
        animation: float 4.5s ease-in-out infinite;
        animation-delay: -2.4s;
        transform-origin: center;
      }
      .react-atom {
        animation: spin 20s linear infinite;
        transform-origin: 30px 30px;
      }
      .border-glow {
        stroke: url(#borderGrad);
        stroke-width: 1.2;
      }
    </style>
    
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <g class="icon-group" filter="url(#shadow)">
    <!-- Glass Background -->
    <rect x="2" y="2" width="56" height="56" rx="14" fill="#09090b" fill-opacity="0.8" class="border-glow" />
    
    <!-- React Atom Logo -->
    <g class="react-atom">
      <!-- Center Nucleus -->
      <circle cx="30" cy="30" r="2.5" fill="#ffffff" />
      <!-- Orbits -->
      <ellipse cx="30" cy="30" rx="16" ry="6" stroke="#ffffff" stroke-width="1.5" transform="rotate(0 30 30)" opacity="0.8" />
      <ellipse cx="30" cy="30" rx="16" ry="6" stroke="#ffffff" stroke-width="1.5" transform="rotate(60 30 30)" opacity="0.8" />
      <ellipse cx="30" cy="30" rx="16" ry="6" stroke="#ffffff" stroke-width="1.5" transform="rotate(120 30 30)" opacity="0.8" />
    </g>
    
    <!-- Mini indicator glow -->
    <circle cx="48" cy="48" r="2.5" fill="#4ea8de" opacity="0.7" />
  </g>
</svg>
