<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60" fill="none">
  <defs>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-3.1px) rotate(-0.5deg); }
      }
      .icon-group {
        animation: float 4.7s ease-in-out infinite;
        animation-delay: -2s;
        transform-origin: center;
      }
      .border-glow {
        stroke: url(#borderGrad);
        stroke-width: 1.2;
      }
    </style>
    
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <g class="icon-group" filter="url(#shadow)">
    <!-- Glass Background -->
    <rect x="2" y="2" width="56" height="56" rx="14" fill="#09090b" fill-opacity="0.8" class="border-glow" />
    
    <!-- Docker Whale & Containers -->
    <g transform="translate(13, 15)" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Containers Stack -->
      <rect x="2" y="2" width="5" height="4" rx="1" fill="#ffffff" fill-opacity="0.1" />
      <rect x="9" y="2" width="5" height="4" rx="1" fill="#ffffff" fill-opacity="0.1" />
      <rect x="16" y="2" width="5" height="4" rx="1" fill="#ffffff" fill-opacity="0.1" />
      
      <rect x="5" y="8" width="5" height="4" rx="1" fill="#ffffff" fill-opacity="0.1" />
      <rect x="12" y="8" width="5" height="4" rx="1" fill="#ffffff" fill-opacity="0.1" />
      
      <!-- Whale Body -->
      <path d="M1,20 C1,16 6,15 9,15 C13,15 15,16 19,16 C23,16 26,13 27,11 L29,11 C28,15 28,19 25,21 C22,23 15,23 9,23 C5,23 1,22 1,20 Z" fill="#ffffff" fill-opacity="0.1" />
      <!-- Tail -->
      <path d="M29,11 C31,9 33,9 34,10 C34,13 32,15 29,15" />
    </g>
    
    <!-- Mini indicator glow -->
    <circle cx="48" cy="48" r="2.5" fill="#74c69d" opacity="0.6" />
  </g>
</svg>
