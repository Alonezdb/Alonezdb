<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60" fill="none">
  <defs>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-3.2px) rotate(0.8deg); }
      }
      .icon-group {
        animation: float 5.4s ease-in-out infinite;
        animation-delay: -2.2s;
        transform-origin: center;
      }
      .border-glow {
        stroke: url(#borderGrad);
        stroke-width: 1.2;
      }
    </style>
    
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <g class="icon-group" filter="url(#shadow)">
    <!-- Glass Background -->
    <rect x="2" y="2" width="56" height="56" rx="14" fill="#09090b" fill-opacity="0.8" class="border-glow" />
    
    <!-- Discord Logo Gamepad shape -->
    <g transform="translate(14, 16)" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round">
      <path d="M27,2 C25,0.7 22,0 19,0 L18,0 C17,1 16.5,2.5 16,3.5 C12,3.5 8,3.5 6,3.5 C5.5,2.5 5,1 4,0 L3,0 C0,0 -3,0.7 -5,2 C-7,6 -10,13.5 -10,20 C-8.5,21.5 -5,23.5 -1.5,24 C-0.5,22.5 0.5,21 1.5,19.5 C-1.5,18.5 -3.5,17 -5,15.5 C-4.5,15 -4,14.5 -3.5,14 C2.5,16.5 8.5,16.5 14.5,14 C15,14.5 15.5,15 16,15.5 C14.5,17 12.5,18.5 9.5,19.5 C10.5,21 11.5,22.5 12.5,24 C16,23.5 19.5,21.5 21,20 C21,13.5 18,6 16,2 Z" transform="translate(11, 0)" />
      <!-- Eyes -->
      <circle cx="10" cy="11.5" r="1.5" fill="#ffffff" stroke="none" />
      <circle cx="22" cy="11.5" r="1.5" fill="#ffffff" stroke="none" />
    </g>
    
    <!-- Mini indicator glow -->
    <circle cx="48" cy="48" r="2.5" fill="#5865f2" opacity="0.6" />
  </g>
</svg>
