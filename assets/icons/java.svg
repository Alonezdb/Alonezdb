<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60" fill="none">
  <defs>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-3px) rotate(1deg); }
      }
      .icon-group {
        animation: float 5s ease-in-out infinite;
        transform-origin: center;
      }
      .border-glow {
        stroke: url(#borderGrad);
        stroke-width: 1.2;
      }
    </style>
    
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <g class="icon-group" filter="url(#shadow)">
    <!-- Glass Background -->
    <rect x="2" y="2" width="56" height="56" rx="14" fill="#09090b" fill-opacity="0.8" class="border-glow" />
    
    <!-- Java Logo path (coffee cup & steam) -->
    <g transform="translate(15, 12)" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <!-- Steam -->
      <path d="M12,2 C12,2 10,5 12,7 C14,9 13,11 13,11" />
      <path d="M16,1 C16,1 14,4 16,6 C18,8 17,10 17,10" />
      <!-- Cup -->
      <path d="M6,14 L24,14 L22,25 C22,27.5 20,29.5 17.5,29.5 L12.5,29.5 C10,29.5 8,27.5 8,25 Z" fill="#ffffff" fill-opacity="0.1" />
      <path d="M24,17 C26.5,17 28.5,18.5 28.5,21 C28.5,23.5 26.5,25 24,25" />
      <!-- Plate -->
      <path d="M4,33 L26,33" />
    </g>
    
    <!-- Mini bottom-right indicator glow -->
    <circle cx="48" cy="48" r="2.5" fill="#e76f51" opacity="0.6" />
  </g>
</svg>
