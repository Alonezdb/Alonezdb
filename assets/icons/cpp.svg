<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60" fill="none">
  <defs>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-3px) rotate(1deg); }
      }
      .icon-group {
        animation: float 5.1s ease-in-out infinite;
        animation-delay: -1.2s;
        transform-origin: center;
      }
      .border-glow {
        stroke: url(#borderGrad);
        stroke-width: 1.2;
      }
    </style>
    
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <g class="icon-group" filter="url(#shadow)">
    <!-- Glass Background -->
    <rect x="2" y="2" width="56" height="56" rx="14" fill="#09090b" fill-opacity="0.8" class="border-glow" />
    
    <!-- C++ Path -->
    <g transform="translate(13, 16)" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <!-- 'C' -->
      <path d="M14,4 C10,4 6,7 6,14 C6,21 10,24 14,24" stroke-width="2.5" />
      <!-- Plus 1 -->
      <g transform="translate(19, 10)">
        <path d="M4,0 L4,8" />
        <path d="M0,4 L8,4" />
      </g>
      <!-- Plus 2 -->
      <g transform="translate(29, 10)">
        <path d="M4,0 L4,8" />
        <path d="M0,4 L8,4" />
      </g>
    </g>
    
    <!-- Mini indicator glow -->
    <circle cx="48" cy="48" r="2.5" fill="#4ea8de" opacity="0.6" />
  </g>
</svg>
