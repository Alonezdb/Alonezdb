<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60" fill="none">
  <defs>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-3.2px) rotate(0.5deg); }
      }
      .icon-group {
        animation: float 5.3s ease-in-out infinite;
        animation-delay: -0.3s;
        transform-origin: center;
      }
      .border-glow {
        stroke: url(#borderGrad);
        stroke-width: 1.2;
      }
    </style>
    
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <g class="icon-group" filter="url(#shadow)">
    <!-- Glass Background -->
    <rect x="2" y="2" width="56" height="56" rx="14" fill="#09090b" fill-opacity="0.8" class="border-glow" />
    
    <!-- VS Code Infinity Ribbon Path -->
    <g transform="translate(14, 14)" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M6,7 L26,24 L30,21 L30,3 L26,0 L6,17 L0,12 L6,7 Z" fill="#ffffff" fill-opacity="0.1" />
      <path d="M6,7 L26,0" />
      <path d="M6,17 L26,24" />
    </g>
    
    <!-- Mini indicator glow -->
    <circle cx="48" cy="48" r="2.5" fill="#4895ef" opacity="0.6" />
  </g>
</svg>
