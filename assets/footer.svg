<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 80" width="100%" height="80" fill="none">
  <defs>
    <!-- Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&amp;family=JetBrains+Mono:wght@400;600&amp;display=swap');
      
      .status-text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        font-weight: 600;
        fill: #34d399;
        letter-spacing: 0.08em;
      }
      
      .footer-brand {
        font-family: 'Outfit', sans-serif;
        font-size: 12px;
        font-weight: 600;
        fill: #71717a;
        letter-spacing: 0.15em;
      }
      
      .brand-highlight {
        fill: #ffffff;
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }

      .pulse-dot {
        animation: pulse 2s infinite;
      }
    </style>

    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Fading divider line -->
  <rect x="0" y="20" width="800" height="1" fill="url(#lineGrad)" />
  
  <g transform="translate(40, 50)">
    <!-- Status indicator (Left aligned) -->
    <circle class="pulse-dot" cx="6" cy="-4" r="3.5" fill="#10b981" />
    <text x="18" y="0" class="status-text">HAVE YOU TRIED TURNING IT OFF AND ON AGAIN?</text>
  </g>

  <g transform="translate(760, 50)">
    <!-- Brand Signature (Right aligned) -->
    <text x="0" y="0" class="footer-brand" text-anchor="end">
      NICO // <tspan class="brand-highlight">ALONEZDB</tspan>
    </text>
  </g>
</svg>
