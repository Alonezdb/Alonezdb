<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="100%" height="120" fill="none">
  <defs>
    <style>
      .grid-dot {
        fill: #18181b;
      }
      .grid-dot-active-1 { fill: #27272a; }
      .grid-dot-active-2 { fill: #3f3f46; }
      .grid-dot-active-3 { fill: #52525b; }
      .grid-dot-active-4 { fill: #71717a; }

      @keyframes snake-crawl {
        0%, 100% { transform: translate(0px, 0px); }
        25% { transform: translate(32px, 0px); }
        50% { transform: translate(32px, 24px); }
        75% { transform: translate(0px, 24px); }
      }
      .snake-head {
        fill: #ffffff;
        animation: snake-crawl 4s linear infinite;
      }
      .snake-body-1 {
        fill: #3b82f6;
        animation: snake-crawl 4s linear infinite;
        animation-delay: -0.2s;
      }
      .snake-body-2 {
        fill: #1d4ed8;
        animation: snake-crawl 4s linear infinite;
        animation-delay: -0.4s;
      }
    </style>
  </defs>

