<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 20" width="100%" height="20" fill="none">
  <defs>
    <linearGradient id="dividerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="15%" stop-color="#ffffff" stop-opacity="0.05" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.25" />
      <stop offset="85%" stop-color="#ffffff" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    
    <linearGradient id="glowSweep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="30%" stop-color="#3b82f6" stop-opacity="0" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.6" />
      <stop offset="70%" stop-color="#3b82f6" stop-opacity="0" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>

    <style>
      @keyframes sweep {
        0% { transform: translateX(-400px); }
        100% { transform: translateX(800px); }
      }
      .sweep-line {
        animation: sweep 6s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
      }
    </style>

    <clipPath id="lineClip">
      <rect x="0" y="9" width="800" height="2" rx="1" />
    </clipPath>
  </defs>

  <!-- Base Divider Line -->
  <rect x="0" y="9" width="800" height="2" rx="1" fill="url(#dividerGrad)" />
  
  <!-- Sweeping Glow Dot -->
  <g clip-path="url(#lineClip)">
    <rect class="sweep-line" x="0" y="9" width="400" height="2" fill="url(#glowSweep)" />
  </g>
</svg>
