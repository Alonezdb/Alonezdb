<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 380" width="100%" height="380" fill="none">
  <defs>
    <!-- Font Import -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&amp;display=swap');
      
      .term-text {
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
        font-size: 13px;
        font-weight: 500;
        fill: #e4e4e7;
      }
      
      .prompt-user {
        fill: #34d399;
        font-weight: 700;
      }
      
      .prompt-colon {
        fill: #e4e4e7;
      }
      
      .prompt-path {
        fill: #60a5fa;
      }
      
      .prompt-dollar {
        fill: #f59e0b;
      }

      .command {
        fill: #ffffff;
        font-weight: 600;
      }

      .output-text {
        fill: #a1a1aa;
      }

      .cursor {
        fill: #60a5fa;
        animation: blink 0.8s step-end infinite;
      }

      @keyframes blink {
        50% { opacity: 0; }
      }

      /* Noise Filter */
      .noise-overlay {
        opacity: 0.04;
      }

      /* Sequential Visibility Animations (20s cycle) */
      @keyframes line-vis-2 { 0%, 14.9% { opacity: 0; } 15%, 100% { opacity: 1; } }
      @keyframes line-vis-3 { 0%, 29.9% { opacity: 0; } 30%, 100% { opacity: 1; } }
      @keyframes line-vis-4 { 0%, 44.9% { opacity: 0; } 45%, 100% { opacity: 1; } }
      @keyframes line-vis-5 { 0%, 59.9% { opacity: 0; } 60%, 100% { opacity: 1; } }
      @keyframes line-vis-6 { 0%, 74.9% { opacity: 0; } 75%, 100% { opacity: 1; } }
      @keyframes line-vis-7 { 0%, 89.9% { opacity: 0; } 90%, 100% { opacity: 1; } }

      .group-2 { animation: line-vis-2 20s infinite; }
      .group-3 { animation: line-vis-3 20s infinite; }
      .group-4 { animation: line-vis-4 20s infinite; }
      .group-5 { animation: line-vis-5 20s infinite; }
      .group-6 { animation: line-vis-6 20s infinite; }
      .group-7 { animation: line-vis-7 20s infinite; }

      /* Typing clips */
      @keyframes type-cmd-1 { 0%, 5% { width: 0; } 12%, 100% { width: 80px; } }
      @keyframes type-cmd-2 { 0%, 18% { width: 0; } 25%, 100% { width: 60px; } }
      @keyframes type-cmd-3 { 0%, 33% { width: 0; } 40%, 100% { width: 80px; } }
      @keyframes type-cmd-4 { 0%, 48% { width: 0; } 55%, 100% { width: 120px; } }
      @keyframes type-cmd-5 { 0%, 63% { width: 0; } 70%, 100% { width: 80px; } }

      .cmd-clip-1 { animation: type-cmd-1 20s infinite; }
      .cmd-clip-2 { animation: type-cmd-2 20s infinite; }
      .cmd-clip-3 { animation: type-cmd-3 20s infinite; }
      .cmd-clip-4 { animation: type-cmd-4 20s infinite; }
      .cmd-clip-5 { animation: type-cmd-5 20s infinite; }

      /* Cursor movement matching commands */
      @keyframes cur-move-all {
        /* Line 1 Typing */
        0%, 5% { transform: translate(0px, 0px); opacity: 1; }
        12%, 14.9% { transform: translate(52px, 0px); opacity: 1; }
        /* Line 2 (Output whoami) -> Cursor moves to prompt 2 */
        15%, 18% { transform: translate(0px, 44px); opacity: 1; }
        25%, 29.9% { transform: translate(36px, 44px); opacity: 1; }
        /* Line 3 (Output role) -> Cursor moves to prompt 3 */
        30%, 33% { transform: translate(0px, 88px); opacity: 1; }
        40%, 44.9% { transform: translate(52px, 88px); opacity: 1; }
        /* Line 4 (Output skills) -> Cursor moves to prompt 4 */
        45%, 48% { transform: translate(0px, 154px); opacity: 1; }
        55%, 59.9% { transform: translate(88px, 154px); opacity: 1; }
        /* Line 5 (Output git status) -> Cursor moves to prompt 5 */
        60%, 63% { transform: translate(0px, 198px); opacity: 1; }
        70%, 74.9% { transform: translate(52px, 198px); opacity: 1; }
        /* Line 6 (Output github) -> Cursor moves to prompt 6 */
        75%, 90% { transform: translate(0px, 242px); opacity: 1; }
        100% { transform: translate(0px, 242px); opacity: 1; }
      }

      .moving-cursor {
        animation: cur-move-all 20s infinite;
      }
    </style>

    <clipPath id="clip-cmd1"><rect class="cmd-clip-1" x="180" y="60" width="0" height="30" /></clipPath>
    <clipPath id="clip-cmd2"><rect class="cmd-clip-2" x="180" y="104" width="0" height="30" /></clipPath>
    <clipPath id="clip-cmd3"><rect class="cmd-clip-3" x="180" y="148" width="0" height="30" /></clipPath>
    <clipPath id="clip-cmd4"><rect class="cmd-clip-4" x="180" y="214" width="0" height="30" /></clipPath>
    <clipPath id="clip-cmd5"><rect class="cmd-clip-5" x="180" y="258" width="0" height="30" /></clipPath>

    <!-- Noise Filter -->
    <filter id="noiseFilter">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch" />
    </filter>

    <linearGradient id="window-border" x1="0" y1="0" x2="0" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02" />
    </linearGradient>
  </defs>

  <!-- Solid background shadow -->
  <rect x="5" y="5" width="640" height="370" rx="16" fill="#000000" opacity="0.5" filter="url(#shadow-blur)" />
  <filter id="shadow-blur"><feGaussianBlur stdDeviation="10" /></filter>

  <!-- Glass Window Body -->
  <rect x="10" y="10" width="630" height="360" rx="14" fill="#09090b" fill-opacity="0.85" stroke="url(#window-border)" stroke-width="1.5" />
  <rect x="10" y="10" width="630" height="360" rx="14" class="noise-overlay" filter="url(#noiseFilter)" pointer-events="none" />

  <!-- Window Title Bar -->
  <path d="M10,24 A14,14 0 0,1 24,10 L626,10 A14,14 0 0,1 640,24 L640,42 L10,42 Z" fill="#18181b" fill-opacity="0.5" stroke="url(#window-border)" stroke-width="1" />
  
  <!-- Apple Controls (Red/Yellow/Green) -->
  <circle cx="30" cy="26" r="6" fill="#ef4444" />
  <circle cx="48" cy="26" r="6" fill="#f59e0b" />
  <circle cx="66" cy="26" r="6" fill="#10b981" />
  
  <!-- Center Title -->
  <text x="325" y="30" class="term-text" font-weight="700" fill="#71717a" text-anchor="middle">nico@alonezdb: ~</text>

  <!-- Terminal Content Group -->
  <g transform="translate(30, 80)">
    <!-- Line 1: whoami -->
    <g>
      <text x="0" y="0" class="term-text"><tspan class="prompt-user">nico</tspan><tspan class="prompt-colon">@</tspan><tspan class="prompt-path">alonezdb</tspan><tspan class="prompt-colon">:</tspan><tspan class="prompt-path">~</tspan><tspan class="prompt-dollar">$ </tspan></text>
      <g clip-path="url(#clip-cmd1)">
        <text x="135" y="0" class="term-text command">whoami</text>
      </g>
    </g>

    <!-- Line 2: output Nico + Prompt 2 (role) -->
    <g class="group-2">
      <text x="0" y="22" class="term-text output-text">Nico</text>
      <text x="0" y="44" class="term-text"><tspan class="prompt-user">nico</tspan><tspan class="prompt-colon">@</tspan><tspan class="prompt-path">alonezdb</tspan><tspan class="prompt-colon">:</tspan><tspan class="prompt-path">~</tspan><tspan class="prompt-dollar">$ </tspan></text>
      <g clip-path="url(#clip-cmd2)">
        <text x="135" y="44" class="term-text command">role</text>
      </g>
    </g>

    <!-- Line 3: output Role + Prompt 3 (skills) -->
    <g class="group-3">
      <text x="0" y="66" class="term-text output-text">IT System Technician</text>
      <text x="0" y="88" class="term-text"><tspan class="prompt-user">nico</tspan><tspan class="prompt-colon">@</tspan><tspan class="prompt-path">alonezdb</tspan><tspan class="prompt-colon">:</tspan><tspan class="prompt-path">~</tspan><tspan class="prompt-dollar">$ </tspan></text>
      <g clip-path="url(#clip-cmd3)">
        <text x="135" y="88" class="term-text command">skills</text>
      </g>
    </g>

    <!-- Line 4: output Skills + Prompt 4 (git status) -->
    <g class="group-4">
      <text x="0" y="110" class="term-text output-text" font-weight="700" fill="#3b82f6">Java  Python  JavaScript  React  C#  C++  Docker  Linux</text>
      <text x="0" y="132" class="term-text"><tspan class="prompt-user">nico</tspan><tspan class="prompt-colon">@</tspan><tspan class="prompt-path">alonezdb</tspan><tspan class="prompt-colon">:</tspan><tspan class="prompt-path">~</tspan><tspan class="prompt-dollar">$ </tspan></text>
      <g clip-path="url(#clip-cmd4)">
        <text x="135" y="132" class="term-text command">git status</text>
      </g>
    </g>

    <!-- Line 5: output git status + Prompt 5 (github) -->
    <g class="group-5">
      <text x="0" y="154" class="term-text output-text">On branch main</text>
      <text x="0" y="176" class="term-text output-text">Your branch is up to date with 'origin/main'.</text>
      <text x="0" y="198" class="term-text output-text">nothing to commit, working tree clean</text>
      <text x="0" y="220" class="term-text"><tspan class="prompt-user">nico</tspan><tspan class="prompt-colon">@</tspan><tspan class="prompt-path">alonezdb</tspan><tspan class="prompt-colon">:</tspan><tspan class="prompt-path">~</tspan><tspan class="prompt-dollar">$ </tspan></text>
      <g clip-path="url(#clip-cmd5)">
        <text x="135" y="220" class="term-text command">github</text>
      </g>
    </g>

    <!-- Line 6: output github + Prompt 6 (idle) -->
    <g class="group-6">
      <text x="0" y="242" class="term-text output-text" fill="#60a5fa" font-weight="700">github.com/Alonezdb</text>
      <text x="0" y="264" class="term-text"><tspan class="prompt-user">nico</tspan><tspan class="prompt-colon">@</tspan><tspan class="prompt-path">alonezdb</tspan><tspan class="prompt-colon">:</tspan><tspan class="prompt-path">~</tspan><tspan class="prompt-dollar">$ </tspan></text>
    </g>

    <!-- Moving Terminal Prompt Cursor -->
    <rect class="cursor moving-cursor" x="135" y="-12" width="7" height="15" />
  </g>
</svg>
